name: Daily Twitter Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_SCRAPE_USERNAME: ${{ secrets.X_SCRAPE_USERNAME }}
          X_SCRAPE_PASSWORD: ${{ secrets.X_SCRAPE_PASSWORD }}
        run: |
          python -m pip install requests twscrape
          python monitor.py
